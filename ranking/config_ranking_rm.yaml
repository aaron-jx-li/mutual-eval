input:
  static_jsonl:
    - results/static_eval/coding_v0/responses.jsonl
  arena_reward_jsonl:
    - results/arena_eval/coding_v0/responses.jsonl

training:
  num_epochs: 5000
  lr: 0.02
  lambda_static: 1.0
  lambda_arena: 1.0
  lambda_bb: 0.3
  reg_lambda: 0.0001
  both_bad_threshold: -1.0
  both_bad_mode: zscore

output:
  output_dir: results/ranking_rm/coding_v0
  save_plot: figures/ranking_rm_coding_v0.pdf
  save_pairwise_targets: true
  no_plot: false
  quiet: false
