# Arena generic evaluation config
#
# Evaluation workflow:
#   python eval_arena/eval_arena_generic.py --config eval_arena/config_arena_generic.yaml

evaluation:
  input_file: data/arena_140k_generic.jsonl
  first_k: 500
  output_dir: results/arena_eval/generic_v0
  openai_base_url: https://api.openai.com/v1
  # Keep direct OpenAI calls pointed at OpenAI, not LiteLLM.
  # Example: https://api.openai.com/v1 or https://us.api.openai.com/v1
  # openai_base_url: https://api.openai.com/v1
  # Leave false so non-Claude models use their native providers.
  use_litellm: false
  # Explicitly constrain LiteLLM routing to Claude models only.
  litellm_models:
    - claude-opus-4-6
    - claude-sonnet-4-6
    - claude-haiku-4-5
  # When resuming, retry prior failed rows with these statuses.
  retry_statuses:
    - generation_error
    - reward_error
  save_every: 100
  resume: true
  max_workers: 8
  generation_timeout: 120
  generation_max_tokens: 4096
  reward_timeout: 300
  reward_max_concurrency: 8
  rm_base_url: ${ARENA_RM_BASE_URL}
  rm_token: ${ARENA_RM_TOKEN}
  models:
    - gpt-5.4
    - gpt-5-mini
    - gpt-4.1
    - gpt-4.1-mini
    - claude-opus-4-6
    - claude-sonnet-4-6
    - claude-haiku-4-5
    - gemini-3.1-pro
    - gemini-2.5-pro
    - gemini-2.5-flash
    - grok-4
    - deepseek-v3.2
    - mistral-large-3
    - qwen3-max-thinking
    - llama-4-maverick-instruct
